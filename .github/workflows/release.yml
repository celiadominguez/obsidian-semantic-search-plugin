name: Release

# Builds the plugin and publishes a GitHub release with the three artifacts
# Obsidian needs (main.js, manifest.json, styles.css) whenever a version tag is
# pushed, e.g. `git tag 1.0.0 && git push origin 1.0.0`.

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: |
          npm run lint
          npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}" >&2
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
