name: Release

# Builds the plugin and publishes a GitHub release with the three artifacts
# Obsidian needs (main.js, manifest.json, styles.css) whenever a version tag is
# pushed, e.g. `git tag 1.0.0 && git push origin 1.0.0`.

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and format check
        run: |
          npm run lint
          npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify tag matches manifest version
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match manifest version ${MANIFEST_VERSION}" >&2
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
          fail_on_unmatched_files: true
